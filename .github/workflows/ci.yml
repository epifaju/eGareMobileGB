# Sprint 1 — CI : tests + vérification build backend ; tests + typecheck mobile.
# Le build natif Android/iOS (Gradle/Xcode) reste en local ou EAS (trop lourd pour ce workflow).
# Phase 6 (ops) : charge k6 manuelle — `k6 run -e BASE_URL=... ops/load/k6-smoke.js` ; Detox — `npm run e2e` dans mobile (APK + émulateur).

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Test + package (verify)
        run: mvn -B -ntp verify

  mobile:
    name: Mobile (Expo / RN)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Unit tests (Jest)
        run: npm test -- --ci --watchAll=false
