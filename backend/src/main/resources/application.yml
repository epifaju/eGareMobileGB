spring:
  application:
    name: gare-mobile-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:garemobilegb}
    username: ${DB_USER:gare}
    password: ${DB_PASSWORD:gare_dev_secret}
    hikari:
      maximum-pool-size: 10
  # Flyway : schéma versionné sous db/migration. Base déjà créée sans Flyway :
  # baseline-on-migrate pose la version 1 sans rejouer V1 (évite les CREATE sur une base existante).
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}
  # Écoute sur toutes les interfaces (nécessaire pour téléphone sur le LAN)
  address: 0.0.0.0

app:
  seed:
    admin-phone: "+24500000001"
    admin-password: ${SEED_ADMIN_PASSWORD:change-me-in-env}
    agent-phone: "+24500000002"
    agent-password: ${SEED_AGENT_PASSWORD:dev-agent-change-me}
  auth:
    # Ne jamais activer en production : renvoie l’OTP dans la réponse JSON (tests / dev sans SMS).
    expose-otp-in-response: false
    # Inscription avec rôle conducteur (body registerAsDriver=true). Désactivé en prod.
    allow-driver-self-registration: false
  jwt:
    # HS256 : minimum 256 bits (32 caractères ASCII). Surcharger en prod via JWT_SECRET.
    secret: ${JWT_SECRET:dev-only-change-me-use-64-chars-minimum-secret-key!!}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  boarding:
    jwt:
      # RS256 : PKCS#8 PEM (clé privée). Dev : classpath:keys/boarding-qr-dev-private.pem
      # Prod : BOARDING_JWT_PRIVATE_KEY (multiligne PEM) — l’app conducteur n’embarque que la clé publique.
      private-key-pem: ${BOARDING_JWT_PRIVATE_KEY:}
      private-key-location: classpath:keys/boarding-qr-dev-private.pem
      expiration-ms: 86400000
  security:
    rate-limit-per-minute: 100
  booking:
    # false = flux Phase 3/4 : réservation → PENDING_PAYMENT → initiate → webhook → PAID.
    # Pour l’ancien flux « confirmation immédiate sans paiement » (dev rapide) :
    #   APP_BOOKING_AUTO_CONFIRM_WITHOUT_PAYMENT_GATEWAY=true
    auto-confirm-without-payment-gateway: false
    # Phase 4 — annulation / remboursement (PRD)
    refund:
      min-minutes-before-departure: 30
      refund-percent-of-paid-amount: 0.80
      refund-provider-sla-hours: 48
      allow-cancel-when-departure-unknown: true
      # false = REFUND_PENDING jusqu’à API remboursement opérateur (Orange, …)
      simulate-provider-refund-instant: true
    # Phase 5 — reçu PDF + SMS (placeholders : {bookingId} {route} {station} {amount} {currency})
    receipt:
      sms-template: >-
        eGare : votre reçu pour la réservation n°{bookingId} ({route}, {station}) est disponible.
        Ouvrez l’application > Mes réservations pour télécharger le PDF.
  payment:
    # sandbox : secret simple (X-Sandbox-Secret) ; production : HMAC corps (X-Signature: sha256=...).
    mode: ${PAYMENT_MODE:sandbox}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:dev-webhook-secret-change-me}
    # URL publique du backend (même hôte que l’API pour le simulateur HTML). Ex. LAN : http://192.168.1.10:8080
    public-base-url: ${PAYMENT_PUBLIC_BASE_URL:http://localhost:8080}
    # Phase 3 — Mobile Money réel (HTTP + chaîne de secours). Ignoré en mode sandbox.
    mobile-money:
      fallback-order:
        - ORANGE_MONEY
        - WAVE
        - MTN
      retry:
        enabled: true
        poll-interval-ms: 120000
      orange-money:
        # --- Web Payment (prioritaire si oauth + web-payment + client + merchant renseignés) ---
        oauth-token-url: ${ORANGE_MONEY_OAUTH_TOKEN_URL:https://api.orange.com/oauth/v2/token}
        web-payment-url: ${ORANGE_MONEY_WEB_PAYMENT_URL:}
        client-id: ${ORANGE_MONEY_CLIENT_ID:}
        client-secret: ${ORANGE_MONEY_CLIENT_SECRET:}
        merchant-key: ${ORANGE_MONEY_MERCHANT_KEY:}
        lang: fr
        currency: XOF
        # optionnel : défauts = public-base-url + chemins API
        # notif-url:
        # return-url:
        # cancel-url:
        response-payment-url-field: payment_url
        response-pay-token-field: pay_token
        # --- Fallback : un seul POST JSON (legacy / mock) ---
        base-url: ${ORANGE_MONEY_API_BASE:}
        api-key: ${ORANGE_MONEY_API_KEY:}
        initiate-path: ${ORANGE_MONEY_INITIATE_PATH:/v1/collect}
        response-redirect-field: redirectUrl
      wave:
        base-url: ${WAVE_API_BASE:}
        api-key: ${WAVE_API_KEY:}
        initiate-path: ${WAVE_INITIATE_PATH:/v1/payments}
        response-redirect-field: redirectUrl
      mtn:
        base-url: ${MTN_API_BASE:}
        api-key: ${MTN_API_KEY:}
        initiate-path: ${MTN_INITIATE_PATH:/momo/v1/collection}
        response-redirect-field: redirectUrl
  sms:
    # NONE = aucun envoi ; LOG = journalisation uniquement ; AFRICASTALKING = non branché (voir docs/SMS_OTP.md).
    provider: LOG
  # Phase 6 — push Expo + SMS fallback (conducteurs : paliers ; passagers : rappels départ).
  notification:
    capacity-sms-fallback-enabled: true
    # {registrationCode} {route} {threshold} {occupied} {capacity} {vehicleId}
    capacity-sms-template: >-
      eGare : {registrationCode} ({route}) — remplissage {threshold} %. Places {occupied}/{capacity}.
      Ouvrez l’app conducteur.
    departure-reminders-enabled: true
    departure-reminder-scan-ms: 60000
    departure-imminent-minutes: 15
    departure-sms-fallback-enabled: true
    # Push / SMS passager : {bookingId} {route} {registrationCode} {departure}
    departure-push-pct80-title: Votre départ approche
    departure-push-pct80-body: "{route} — véhicule {registrationCode}. Pensez à vous présenter à l’heure à la gare."
    departure-push-imminent-title: Départ imminent
    departure-push-imminent-body: "{route} — {registrationCode} : départ sous peu. Présentez votre billet (QR) à l’embarquement."
    departure-sms-pct80-template: >-
      eGare : rappel trajet {route} ({registrationCode}). Départ prévu {departure}. Réf. résa {bookingId}.
    departure-sms-imminent-template: >-
      eGare : départ imminent — {route} ({registrationCode}), {departure}. Résa {bookingId}. Présentez votre QR.

logging:
  level:
    org.springframework.security: INFO
    com.garemobilegb: INFO

# Phase 6 — observabilité (Sprint 4 PRD) : santé + métriques Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
