# Gare Mobile GB — infrastructure locale (Sprint 1)
# Usage : docker compose up -d
# Port hôte PostgreSQL : 5433 par défaut (5432 est souvent déjà pris par un PostgreSQL local).

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gare_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-garemobilegb}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gare} -d ${POSTGRES_DB:-garemobilegb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gare-network

  redis:
    image: redis:7-alpine
    container_name: gare-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gare-network

  minio:
    image: minio/minio:latest
    container_name: gare-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gare-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  gare-network:
    driver: bridge
